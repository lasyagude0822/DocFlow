<!DOCTYPE html>
<html>
<body>

<h2>Upload File Test</h2>

<input type="file" id="fileInput" />
<br><br>

<button onclick="uploadFile()">Upload</button>

<script>
async function uploadFile() {

  const file = document.getElementById("fileInput").files[0];

  const formData = new FormData();
  formData.append("file", file);

  const token = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJ1c2VySWQiOiI2OWE0NmJiZjIwMTQ5Y2NiYWQzMjQxMDEiLCJpYXQiOjE3NzIzOTczNzUsImV4cCI6MTc3MzAwMjE3NX0.HnPrB5KtfsYWKhNdmCnknGmmLu7F-cgdg4Dyk8-TsLs";

  const res = await fetch(
    "http://localhost:5000/api/documents/upload",
    {
      method: "POST",
      headers: {
        Authorization: `Bearer ${token}`
      },
      body: formData
    }
  );

  const data = await res.json();
  console.log(data);
  alert(JSON.stringify(data));
}
</script>

</body>
</html>
